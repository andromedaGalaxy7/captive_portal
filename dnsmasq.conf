# Generated by miku on 1st Nov 2025
# Best DNSMasq config file ever written
# By a human

# Interface we-re running on 😎
interface=%INTERFACE%

# range of address to assign, and the subnet mask 📋
dhcp-range=192.168.1.2,192.168.1.254,255.255.255.0,1w

# default gateway to send to clients 💻
dhcp-option=option:router,192.168.1.1

# the default DNS handed by the DHCP 🌎
dhcp-option=option:dns-server,8.8.8.8

# static address resolution
address=/#/192.168.1.1

# Force redirect common captive portal checks
# (Optional) Explicitly intercept connectivity URLs
address=/connectivitycheck.gstatic.com/192.168.1.1
address=/clients3.google.com/192.168.1.1
address=/connectivitycheck.android.com/192.168.1.1
address=/captive.apple.com/192.168.1.1
address=/msftconnecttest.com/192.168.1.1
address=/detectportal.firefox.com/192.168.1.1

# log everything ✍️
log-queries