<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Our WiFi</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body, html {
        height: 100%;
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: #fff;
        text-align: center;
    }

    .container {
        background: rgba(0, 0, 0, 0.6);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 90%;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 2rem;
        letter-spacing: 1px;
    }

    p {
        font-size: 1rem;
        margin-bottom: 30px;
    }

    .button {
        background: #fff;
        color: #2575fc;
        padding: 15px 30px;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
    }

    .button:hover {
        background: #2575fc;
        color: #fff;
        transform: scale(1.05);
    }

    footer {
        margin-top: 20px;
        font-size: 0.8rem;
        opacity: 0.8;
    }

    #pass{
        margin: 1rem;
        border-radius: 0.5rem;
        font-size: large;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Welcome!</h1>
        <p>Thank you for connecting to our WiFi network. Please type the password and click below to start browsing.</p>
        <form action="verify">
            <input type="password" name="pass" id="pass" required>
            <br>
            <input type="submit" class="button" value="Continue">
        </form>
        <footer>&copy; 2025 Your WiFi Network</footer>
    </div>
</body>
</html>
