<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body, html {
        height: 100%;
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #11998e, #38ef7d);
        color: #fff;
        text-align: center;
        animation: fadeIn 1s ease-in-out;
    }

    .container {
        background: rgba(0, 0, 0, 0.5);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        max-width: 400px;
        width: 90%;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    p {
        font-size: 1rem;
        opacity: 0.9;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Thank You!</h1>
        <p>You are now connected. Enjoy browsing the internet!</p>
    </div>
</body>
</html>
